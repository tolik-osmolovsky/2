<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Совместный ежедневник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Формы авторизации */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 32px);
        }

        .auth-box {
            background: white;
            padding: 32px 24px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .auth-box h2 {
            margin-bottom: 24px;
            color: #333;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input, 
        .form-group textarea, 
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, 
        .form-group textarea:focus, 
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #48bb78;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .error {
            color: #e53e3e;
            margin-top: 12px;
            font-size: 14px;
        }

        /* Дашборд */
        .dashboard {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Сетка пространств */
        .spaces-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .space-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .space-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .space-card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            padding-right: 60px;
        }

        .space-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .space-card small {
            color: #999;
            font-size: 12px;
        }

        .delete-space-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #f56565;
            padding: 6px 10px;
            font-size: 12px;
        }

        .delete-space-btn:hover {
            background: #e53e3e;
        }

        /* Задачи */
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .add-task-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .add-task-form.active {
            display: block;
        }

        .task-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.3s;
            position: relative;
        }

        .task-card.completed {
            opacity: 0.6;
            background: #fafafa;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            padding-right: 70px;
        }

        .task-title input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .task-title span {
            flex: 1;
            line-height: 1.4;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 12px 0;
            font-size: 13px;
            color: #666;
        }

        .due-date {
            color: #e53e3e;
        }

        .delete-task-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #f56565;
            padding: 4px 10px;
            font-size: 12px;
        }

        .comments-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }

        .comment {
            background: #f8f9fa;
            padding: 10px 12px;
            margin: 8px 0;
            border-radius: 8px;
            font-size: 14px;
        }

        .comment-author {
            font-weight: 600;
            color: #667eea;
            margin-right: 8px;
        }

        .comment-text {
            word-break: break-word;
        }

        .comment-date {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .add-comment {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .add-comment input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .invite-info {
            background: #e8f5e9;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .invite-code-text {
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 8px;
            }

            .dashboard {
                padding: 16px;
            }

            .header h1 {
                font-size: 20px;
            }

            .spaces-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .task-meta {
                gap: 12px;
                font-size: 12px;
            }

            .invite-info {
                flex-direction: column;
                align-items: stretch;
            }

            .action-buttons {
                flex-direction: column;
            }

            .action-buttons button {
                width: 100%;
            }

            .task-title {
                font-size: 15px;
                padding-right: 60px;
            }

            .delete-task-btn {
                top: 8px;
                right: 8px;
            }
        }

        @media (max-width: 480px) {
            .auth-box {
                padding: 24px 20px;
            }

            button {
                width: 100%;
                margin-bottom: 8px;
            }

            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .user-info {
                justify-content: space-between;
            }
        }
        /* Перенос длинных слов */
        .task-card,
        .task-title,
        .comment-text,
        .comment {
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }

        /* Ограничение для описания задачи */
        .task-description {
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Аутентификация -->
        <div id="authContainer" class="auth-container">
            <div class="auth-box">
                <h2>📅 Совместный ежедневник</h2>
                <div id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" placeholder="******">
                    </div>
                    <button onclick="login()">Войти</button>
                    <button onclick="showRegister()" class="btn-secondary" style="margin-left: 10px;">Регистрация</button>
                    <div id="authError" class="error"></div>
                </div>
                <div id="registerForm" class="hidden">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="regName" placeholder="Ваше имя">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" placeholder="минимум 6 символов">
                    </div>
                    <button onclick="register()">Зарегистрироваться</button>
                    <button onclick="showLogin()">Назад</button>
                    <div id="regError" class="error"></div>
                </div>
            </div>
        </div>

        <!-- Дашборд -->
        <div id="dashboard" class="container hidden">
            <div class="dashboard">
                <div class="header">
                    <h1>📅 Совместный ежедневник</h1>
                    <div class="user-info">
                        <span id="userName"></span>
                        <button onclick="logout()" class="btn-small">Выйти</button>
                    </div>
                </div>

                <!-- Список пространств -->
                <div id="spacesView">
                    <div class="action-buttons">
                        <button onclick="showCreateSpaceForm()">➕ Создать ежедневник</button>
                        <button onclick="showJoinSpaceForm()" class="btn-secondary">🔗 Присоединиться по коду</button>
                    </div>
                    <div id="spacesList" class="spaces-grid"></div>
                </div>

                <!-- Форма создания пространства -->
                <div id="createSpaceForm" class="hidden">
                    <h3>Создать ежедневник</h3>
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="spaceName" placeholder="Например: Работа, Дом, Проект">
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="spaceDescription" rows="2"></textarea>
                    </div>
                    <button onclick="createSpace()">Создать</button>
                    <button onclick="hideCreateSpaceForm()" class="btn-secondary">Отмена</button>
                </div>

                <!-- Задачи пространства -->
                <div id="tasksView" class="hidden">
                    <button onclick="backToSpaces()" class="btn-secondary btn-small" style="margin-bottom: 16px;">← Назад к списку</button>
                    
                    <div class="tasks-header">
                        <h2 id="currentSpaceName"></h2>
                        <button onclick="showAddTaskForm()">➕ Добавить задачу</button>
                    </div>
                    
                    <div id="inviteInfo" class="invite-info"></div>
                    
                    <!-- Форма добавления задачи -->
                    <div id="addTaskForm" class="add-task-form">
                        <h3>Новая задача</h3>
                        <div class="form-group">
                            <label>Название</label>
                            <input type="text" id="taskTitle" placeholder="Что нужно сделать?">
                        </div>
                        <div class="form-group">
                            <label>Описание</label>
                            <textarea id="taskDescription" rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Дата выполнения</label>
                            <input type="date" id="taskDueDate">
                        </div>
                        <div class="form-group">
                            <label>Время</label>
                            <input type="time" id="taskDueTime">
                        </div>
                        <div class="form-group">
                            <label>Назначить (опционально)</label>
                            <select id="taskAssignedTo"></select>
                        </div>
                        <button onclick="createTask()">Создать</button>
                        <button onclick="hideAddTaskForm()" class="btn-secondary">Отмена</button>
                    </div>
                    
                    <!-- Список задач -->
                    <div id="tasksList"></div>
                </div>

                <!-- Форма присоединения -->
                <div id="joinSpaceForm" class="hidden">
                    <h3>Присоединиться по коду</h3>
                    <div class="form-group">
                        <label>Код приглашения</label>
                        <input type="text" id="inviteCode" placeholder="Например: ABC123" style="text-transform: uppercase;">
                    </div>
                    <button onclick="joinSpace()">Присоединиться</button>
                    <button onclick="hideJoinSpaceForm()" class="btn-secondary">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
