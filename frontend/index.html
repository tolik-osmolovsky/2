<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Совместный ежедневник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Формы авторизации */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .auth-box h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        /* Дашборд */
        .dashboard {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .spaces-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .space-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .space-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        /* Задачи */
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .add-task-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .task-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .task-card.completed {
            opacity: 0.7;
            background: #f0f0f0;
        }

        .task-title {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-title input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .task-meta {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            font-size: 14px;
            color: #666;
        }

        .due-date {
            color: #e53e3e;
        }

        .comments-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .comment {
            background: #f8f9fa;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 14px;
        }

        .comment-author {
            font-weight: bold;
            color: #667eea;
        }

        .add-comment {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-comment input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .add-comment button {
            padding: 8px 15px;
        }

        .invite-code {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
            margin: 10px 0;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Аутентификация -->
        <div id="authContainer" class="auth-container">
            <div class="auth-box">
                <h2>Вход / Регистрация</h2>
                <div id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" placeholder="******">
                    </div>
                    <button onclick="login()">Войти</button>
                    <button onclick="showRegister()" style="margin-left: 10px; background: #48bb78;">Регистрация</button>
                    <div id="authError" class="error"></div>
                </div>
                <div id="registerForm" class="hidden">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="regName" placeholder="Ваше имя">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" placeholder="минимум 6 символов">
                    </div>
                    <button onclick="register()">Зарегистрироваться</button>
                    <button onclick="showLogin()">Назад</button>
                    <div id="regError" class="error"></div>
                </div>
            </div>
        </div>

        <!-- Дашборд -->
        <div id="dashboard" class="container hidden">
            <div class="dashboard">
                <div class="header">
                    <h1>📅 Совместный ежедневник</h1>
                    <div>
                        <span id="userName"></span>
                        <button onclick="logout()" style="margin-left: 10px;">Выйти</button>
                    </div>
                </div>

                <!-- Список пространств -->
                <div id="spacesView">
                    <div style="margin-bottom: 20px;">
                        <button onclick="showCreateSpaceForm()">➕ Создать новый ежедневник</button>
                        <button onclick="showJoinSpaceForm()">🔗 Присоединиться по коду</button>
                    </div>
                    <div id="spacesList" class="spaces-list"></div>
                </div>

                <!-- Форма создания пространства -->
                <div id="createSpaceForm" class="hidden">
                    <h3>Создать ежедневник</h3>
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="spaceName" placeholder="Например: Работа, Дом, Проект">
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="spaceDescription" rows="3"></textarea>
                    </div>
                    <button onclick="createSpace()">Создать</button>
                    <button onclick="hideCreateSpaceForm()">Отмена</button>
                </div>

                <!-- Задачи пространства -->
                <div id="tasksView" class="hidden">
                    <button onclick="backToSpaces()" style="margin-bottom: 20px;">← Назад к списку</button>
                    <div class="tasks-header">
                        <h2 id="currentSpaceName"></h2>
                        <button onclick="showAddTaskForm()">➕ Добавить задачу</button>
                    </div>
                    
                    <div id="inviteInfo" class="invite-code"></div>
                    
                    <!-- Форма добавления задачи -->
                    <div id="addTaskForm" class="add-task-form hidden">
                        <h3>Новая задача</h3>
                        <div class="form-group">
                            <label>Название</label>
                            <input type="text" id="taskTitle" placeholder="Что нужно сделать?">
                        </div>
                        <div class="form-group">
                            <label>Описание</label>
                            <textarea id="taskDescription" rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Дата выполнения</label>
                            <input type="date" id="taskDueDate">
                        </div>
                        <div class="form-group">
                            <label>Время</label>
                            <input type="time" id="taskDueTime">
                        </div>
                        <div class="form-group">
                            <label>Назначить (опционально)</label>
                            <select id="taskAssignedTo"></select>
                        </div>
                        <button onclick="createTask()">Создать</button>
                        <button onclick="hideAddTaskForm()">Отмена</button>
                    </div>
                    
                    <!-- Список задач -->
                    <div id="tasksList"></div>
                </div>

                <!-- Форма присоединения -->
                <div id="joinSpaceForm" class="hidden">
                    <h3>Присоединиться по коду</h3>
                    <div class="form-group">
                        <label>Код приглашения</label>
                        <input type="text" id="inviteCode" placeholder="Например: ABC123">
                    </div>
                    <button onclick="joinSpace()">Присоединиться</button>
                    <button onclick="hideJoinSpaceForm()">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
